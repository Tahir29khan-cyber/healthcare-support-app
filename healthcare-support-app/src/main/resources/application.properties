# ============================================
#  Jarurat Care - Healthcare Support App
#  Application Configuration
# ============================================

# Server
server.port=8080

# Application Name
spring.application.name=healthcare-support-app

# ---- H2 In-Memory Database ----
spring.datasource.url=jdbc:h2:mem:healthcaredb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (access at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- JPA / Hibernate ----
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- Thymeleaf ----
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ---- Logging ----
logging.level.com.jarurat=DEBUG
logging.level.org.springframework.web=INFO
